name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: 22.19.0

jobs:
  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/release/prepare-app-version-from-tag.mjs "$RELEASE_TAG" --github-output "$GITHUB_OUTPUT" --json

  windows:
    name: Windows x64
    runs-on: windows-latest
    needs: release-metadata
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release version config
        shell: bash
        working-directory: crates/agent-gui
        run: node ../../scripts/release/prepare-app-version-from-tag.mjs "$LIVEAGENT_RELEASE_TAG" --github-env "$GITHUB_ENV" --tauri-config src-tauri/tauri.version.generated.conf.json

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          choco install protoc -y --no-progress
          "$env:ChocolateyInstall\lib\protoc\tools\bin" | Out-File -Append $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        working-directory: crates/agent-gui
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIVEAGENT_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          LIVEAGENT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm tauri build --config src-tauri/tauri.windows.release.conf.json --config "$LIVEAGENT_TAURI_VERSION_CONFIG" --target x86_64-pc-windows-msvc

      - name: Stage Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          msi_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.msi' -path '*bundle*' -print -quit 2>/dev/null || true)"
          exe_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.exe' -path '*bundle*' -print -quit 2>/dev/null || true)"
          portable_exe_path="$(find target crates/agent-gui/src-tauri/target -type f -name 'liveagent.exe' -path '*/release/*' ! -path '*bundle*' -print -quit 2>/dev/null || true)"
          test -n "$msi_path"
          test -n "$exe_path"
          test -n "$portable_exe_path"
          test -f "$msi_path.sig"
          test -f "$exe_path.sig"
          cp "$msi_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi"
          cp "$msi_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi.sig"
          cp "$exe_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe"
          cp "$exe_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe.sig"
          mkdir -p dist/portable/LiveAgent
          cp "$portable_exe_path" dist/portable/LiveAgent/LiveAgent.exe
          portable_zip="dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-portable.zip"
          powershell -NoProfile -Command "Compress-Archive -Path 'dist/portable/LiveAgent/*' -DestinationPath '$portable_zip' -Force"
          rm -rf dist/portable
          test "$(find dist -type f | wc -l)" -gt 0

      - uses: actions/upload-artifact@v7
        with:
          name: liveagent-windows-x64
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Windows Release
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - windows
    env:
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish Windows assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          PACKYCODE_API_KEY: ${{ secrets.PACKYCODE_API_KEY }}
          AI_RELEASE_NOTES_API_KEY: ${{ secrets.AI_RELEASE_NOTES_API_KEY }}
          AI_RELEASE_NOTES_BASE_URL: ${{ vars.AI_RELEASE_NOTES_BASE_URL }}
          AI_RELEASE_NOTES_MODEL: ${{ vars.AI_RELEASE_NOTES_MODEL }}
        run: |
          set -euo pipefail
          github_notes_path="$RUNNER_TEMP/liveagent-github-release-notes.md"
          notes_path="$RUNNER_TEMP/liveagent-release-notes.md"
          if ! gh api "repos/$GH_REPO/releases/generate-notes" -f tag_name="$RELEASE_TAG" --jq ".body" > "$github_notes_path"; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$github_notes_path"
          fi
          if [ ! -s "$github_notes_path" ]; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$github_notes_path"
          fi

          node scripts/release/create-ai-release-notes.mjs "$RELEASE_TAG" "$notes_path" "$github_notes_path"
          if [ ! -s "$notes_path" ]; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$notes_path"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "LiveAgent $RELEASE_TAG" --notes-file "$notes_path" --prerelease="$LIVEAGENT_IS_PRERELEASE"
          else
            create_args=(--verify-tag --title "LiveAgent $RELEASE_TAG" --notes-file "$notes_path")
            if [ "$LIVEAGENT_IS_PRERELEASE" = true ]; then
              create_args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${create_args[@]}"
          fi

          mapfile -t signature_assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name | select(endswith(".sig"))')
          for asset in "${signature_assets[@]}"; do
            gh release delete-asset "$RELEASE_TAG" "$asset" --yes
          done

          mapfile -t public_assets < <(find release-artifacts -maxdepth 1 -type f ! -name '*.sig' -print)
          if [ "${#public_assets[@]}" -eq 0 ]; then
            echo "No Windows release assets were found."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${public_assets[@]}" --clobber

name: Gateway Docker

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/liveagent-gateway

jobs:
  build-and-push:
    name: Build and Push Gateway Image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'workflow_run' }}
            type=ref,event=tag,enable=${{ github.event_name != 'workflow_run' }}
            type=sha,prefix=sha-,enable=${{ github.event_name != 'workflow_run' }}
            type=raw,value=main,enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }},enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy-railway:
    name: Deploy Gateway to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main'
    environment: railway-production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
      LIVEAGENT_GATEWAY_TOKEN: ${{ secrets.LIVEAGENT_GATEWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.1

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.61.1

      - name: Deploy
        run: |
          set -euo pipefail
          test -n "$RAILWAY_TOKEN"
          variable_args=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            variable_args+=(--service "$RAILWAY_SERVICE")
          fi
          if [ -n "$RAILWAY_ENVIRONMENT" ]; then
            variable_args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi
          if [ -n "$LIVEAGENT_GATEWAY_TOKEN" ]; then
            printf '%s' "$LIVEAGENT_GATEWAY_TOKEN" | railway variable set LIVEAGENT_GATEWAY_TOKEN --stdin --skip-deploys "${variable_args[@]}"
          else
            echo "::warning::LIVEAGENT_GATEWAY_TOKEN secret is not set; Railway must already have this service variable."
          fi
          args=(up --ci --detach)
          if [ -n "$RAILWAY_SERVICE" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi
          if [ -n "$RAILWAY_ENVIRONMENT" ]; then
            args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi
          railway "${args[@]}"
